<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | NFT preview card component</title>
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <div class="father">
    <div class="content">
      <div class="image-container">
        <img src="images/image-equilibrium.jpg" alt="Equilibrium" class="equilibrium">
        <div class="overlay">
          <img src="images/icon-view.svg" alt="view icon">
        </div>
      </div>

      <div class="text">
        <h2>Equilibrium #3429</h2>
        <p class="description">Our Equilibrium collection promotes balance and calm.</p>
      </div>
      <div class="details">
        <p class="eth"><img src="images/icon-ethereum.svg" alt="ethereum" class="ether">0.041 ETH</p>
        <p class="date"><img src="images/icon-clock.svg" alt="clock" class="clock">3 days left</p>
      </div>
      <hr>
      <div class="creator">
        <img src="images/image-avatar.png" alt="avatar" class="avatar">
        <p><span class="creation">Creation of</span> <span class="creator-name">Jules Wyvern</span></p>
      </div>
    </div>
  </div>
</body>
</html>
